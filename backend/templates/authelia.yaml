id: authelia
name: Authelia
version: '4.37'
description: Authentication and authorization server providing 2FA and SSO
icon: https://serverkit.ai/imgs/template-icons/authelia.png
website: https://www.authelia.com
documentation: https://www.authelia.com/docs/
categories:
- security
- authentication
- sso
variables:
- name: HTTP_PORT
  description: HTTP port
  type: port
  default: '9091'
  hidden: true
- name: JWT_SECRET
  description: JWT secret
  type: password
  generate: password
- name: SESSION_SECRET
  description: Session secret
  type: password
  generate: password
- name: STORAGE_ENCRYPTION_KEY
  description: Storage encryption key
  type: password
  generate: password
- name: DOMAIN
  description: Domain name (e.g., example.com)
  required: true
ports:
- port: 9091
  protocol: tcp
  description: Authentication portal
volumes:
- name: config
  path: /config
  description: Authelia configuration
compose:
  services:
    app:
      image: yourimage:latest
      ports:
      - ${PORT}:80
post_install: "# Create basic configuration\ncat > /var/serverkit/apps/${APP_NAME}/config/configuration.yml\
  \ << 'EOF'\ntheme: dark\ndefault_redirection_url: https://${DOMAIN}\nserver:\n \
  \ host: 0.0.0.0\n  port: 9091\nlog:\n  level: info\nauthentication_backend:\n  file:\n\
  \    path: /config/users_database.yml\naccess_control:\n  default_policy: deny\n\
  session:\n  name: authelia_session\n  domain: ${DOMAIN}\n  expiration: 1h\n  inactivity:\
  \ 5m\nstorage:\n  local:\n    path: /config/db.sqlite3\nnotifier:\n  filesystem:\n\
  \    filename: /config/notification.txt\nEOF\n"
