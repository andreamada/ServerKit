# ============================================
# ServerKit Docker Compose — Production
# ============================================
# Used by install.sh and the `serverkit` CLI.
#
# Architecture:
#   - Backend runs directly on the host via systemd (full system access)
#   - Frontend runs in Docker (nginx serving pre-built static files)
#
# The frontend image is built from a pre-built dist/ folder.
# Run `npm run build` inside frontend/ on the host before `docker compose build`.
#
# Usage (via serverkit CLI):
#   serverkit start / stop / restart / logs
#
# Direct usage:
#   docker compose build
#   docker compose up -d
# ============================================

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: serve-prebuilt
    container_name: serverkit-frontend
    ports:
      - "3847:80"
    extra_hosts:
      - "backend:host-gateway"
    networks:
      - serverkit-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  serverkit-network:
    driver: bridge
    name: serverkit-network

volumes:
  serverkit-data:
    name: serverkit-data
  serverkit-config:
    name: serverkit-config
